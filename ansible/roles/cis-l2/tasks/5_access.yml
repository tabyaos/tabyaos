---
# CIS AL2023 Section 5: Access, Authentication and Authorization

# ── 5.1 Configure cron ────────────────────────────────────────────────────────

- name: CIS AL2023 5.1.1 | Ensure cron daemon is enabled
  ansible.builtin.service:
    name: crond
    enabled: true
    state: started
  when: cis_l2_manage_services | bool

- name: CIS AL2023 5.1.2-7 | Set permissions on cron files
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0600"
  loop:
    - /etc/crontab
    - /etc/cron.hourly
    - /etc/cron.daily
    - /etc/cron.weekly
    - /etc/cron.monthly
    - /etc/cron.d
  failed_when: false

- name: CIS AL2023 5.1.8 | Restrict at/cron to authorised users
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/cron.deny
    - /etc/at.deny

- name: CIS AL2023 5.1.8 | Create cron.allow with root only
  ansible.builtin.copy:
    dest: /etc/cron.allow
    content: "root\n"
    owner: root
    group: root
    mode: "0600"

- name: CIS AL2023 5.1.8 | Create at.allow with root only
  ansible.builtin.copy:
    dest: /etc/at.allow
    content: "root\n"
    owner: root
    group: root
    mode: "0600"

# ── 5.2 SSH Server Configuration ──────────────────────────────────────────────

- name: CIS AL2023 5.2 | Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: reload sshd

- name: CIS AL2023 5.2.1 | Set permissions on /etc/ssh/sshd_config
  ansible.builtin.file:
    path: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"

- name: CIS AL2023 5.2.x | Set permissions on SSH host private keys
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0600"
  with_fileglob:
    - /etc/ssh/ssh_host_*_key
  failed_when: false

- name: CIS AL2023 5.2.x | Set permissions on SSH host public keys
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0644"
  with_fileglob:
    - /etc/ssh/ssh_host_*_key.pub
  failed_when: false

# ── 5.3 Configure authselect ──────────────────────────────────────────────────

- name: CIS AL2023 5.3.1 | Install authselect
  ansible.builtin.dnf:
    name: authselect
    state: present

- name: CIS AL2023 5.3.1 | Configure authselect with minimal profile
  ansible.builtin.command: authselect select minimal --force
  changed_when: false

# ── 5.3 Configure PAM ─────────────────────────────────────────────────────────

- name: CIS AL2023 5.3.1 | Ensure password creation requirements (pwquality)
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: minlen,   value: "{{ cis_l2_password_min_length }}" }
    - { key: minclass, value: "{{ cis_l2_password_complexity_minclass }}" }
    - { key: dcredit,  value: "-1" }
    - { key: ucredit,  value: "-1" }
    - { key: lcredit,  value: "-1" }
    - { key: ocredit,  value: "-1" }

- name: CIS AL2023 5.3.2 | Ensure account lockout (faillock)
  ansible.builtin.lineinfile:
    path: /etc/security/faillock.conf
    regexp: "^{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
  loop:
    - { key: deny,        value: "{{ cis_l2_account_lockout_attempts }}" }
    - { key: unlock_time, value: "{{ cis_l2_account_lockout_unlock_time }}" }
    - { key: fail_interval, value: "900" }

# ── 5.4 User Accounts ─────────────────────────────────────────────────────────

- name: CIS AL2023 5.4.1.1 | Set password maximum days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS   {{ cis_l2_password_max_days }}"

- name: CIS AL2023 5.4.1.2 | Set password minimum days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS   {{ cis_l2_password_min_days }}"

- name: CIS AL2023 5.4.1.3 | Set password warning days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: "PASS_WARN_AGE   {{ cis_l2_password_warn_days }}"

- name: CIS AL2023 5.4.1.4 | Set password inactive days
  ansible.builtin.command: useradd -D -f {{ cis_l2_password_inactive_days }}
  changed_when: false

- name: CIS AL2023 5.4.2 | Ensure system accounts are non-login
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '($3 < 1000 && $1 != "root" && $1 != "sync" && $1 != "shutdown" &&
              $1 != "halt" && $7 != "/sbin/nologin" && $7 != "/usr/sbin/nologin" &&
              $7 != "/bin/false") {print $1}' /etc/passwd
  register: system_accounts_with_login
  changed_when: false

- name: CIS AL2023 5.4.2 | Lock system accounts with invalid shells
  ansible.builtin.command: usermod -s /sbin/nologin {{ item }}
  loop: "{{ system_accounts_with_login.stdout_lines }}"
  when: system_accounts_with_login.stdout_lines | length > 0

- name: CIS AL2023 5.4.3 | Set default group for root account
  ansible.builtin.command: usermod -g 0 root
  changed_when: false

- name: CIS AL2023 5.4.4 | Set default umask for users
  ansible.builtin.lineinfile:
    path: /etc/bashrc
    regexp: '^umask'
    line: 'umask 027'

- name: CIS AL2023 5.4.4 | Set default umask in /etc/profile
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: '^umask'
    line: 'umask 027'

- name: CIS AL2023 5.4.5 | Set default shell timeout (TMOUT)
  ansible.builtin.copy:
    dest: /etc/profile.d/99-cis-tmout.sh
    content: |
      readonly TMOUT=900
      export TMOUT
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 5.5 | Ensure root login is restricted to system console
  ansible.builtin.copy:
    dest: /etc/securetty
    content: "console\n"
    owner: root
    group: root
    mode: "0600"

- name: CIS AL2023 5.6 | Ensure access to the su command is restricted
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^auth\s+required\s+pam_wheel'
    line: 'auth           required        pam_wheel.so use_uid'
    insertafter: '^#auth\s+required\s+pam_wheel'
