---
# CIS RHEL 9 — Section 2: Services

- name: "CIS RHEL9 2.1 | Remove telnet-server"
  ansible.builtin.dnf:
    name: telnet-server
    state: absent
  when: (cis_rhel9_remove_telnet | default(true)) and (cis_rhel9_manage_services | default(true))

- name: "CIS RHEL9 2.2 | Remove rsh-server"
  ansible.builtin.dnf:
    name: rsh-server
    state: absent
  when: (cis_rhel9_remove_rsh | default(true)) and (cis_rhel9_manage_services | default(true))

- name: "CIS RHEL9 2.3 | Remove ypbind / NIS client"
  ansible.builtin.dnf:
    name: ypbind
    state: absent
  when: (cis_rhel9_remove_nis | default(true)) and (cis_rhel9_manage_services | default(true))

- name: "CIS RHEL9 2.4 | Remove avahi-autoipd"
  ansible.builtin.dnf:
    name: avahi-autoipd
    state: absent
  when: (cis_rhel9_remove_avahi | default(true)) and (cis_rhel9_manage_services | default(true))

- name: "CIS RHEL9 2.5 | Remove cups (printing)"
