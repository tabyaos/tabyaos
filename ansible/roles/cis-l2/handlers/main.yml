---
# Handlers fire only when a task reports `changed`. On the second (idempotency)
# run nothing changes so these are never triggered. failed_when: false
# prevents container-environment failures from blocking test runs.

- name: reload sshd
  ansible.builtin.service:
    name: sshd
    state: reloaded
  failed_when: false

- name: restart auditd
  ansible.builtin.service:
    name: auditd
    state: restarted
  failed_when: false

- name: restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted
  failed_when: false

- name: restart chronyd
  ansible.builtin.service:
    name: chronyd
    state: restarted
  failed_when: false

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  failed_when: false

- name: rebuild initramfs
  ansible.builtin.command: dracut -f
  failed_when: false
  changed_when: false
