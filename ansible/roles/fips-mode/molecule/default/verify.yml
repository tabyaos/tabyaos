---
- name: Verify — fips-mode
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Assert FIPS-required packages are installed
      ansible.builtin.package_facts:
        manager: rpm
    - ansible.builtin.assert:
        that:
          - "'crypto-policies' in ansible_facts.packages"
          - "'crypto-policies-scripts' in ansible_facts.packages"
          - "'openssl' in ansible_facts.packages"
        fail_msg: "FIPS: required packages (crypto-policies, crypto-policies-scripts, openssl) not all installed"

    - name: Assert /etc/crypto-policies/config exists
      ansible.builtin.stat:
        path: /etc/crypto-policies/config
      register: crypto_config
    - ansible.builtin.assert:
        that: crypto_config.stat.exists
        fail_msg: "FIPS: /etc/crypto-policies/config not created by update-crypto-policies"

    - name: Assert crypto policy config file contains FIPS
      ansible.builtin.slurp:
        src: /etc/crypto-policies/config
      register: crypto_config_content
    - ansible.builtin.assert:
        that: "'FIPS' in (crypto_config_content.content | b64decode)"
        fail_msg: "FIPS: /etc/crypto-policies/config does not contain FIPS policy"

    - name: Assert /etc/tabyaos-release contains FIPS pending-reboot marker
      ansible.builtin.slurp:
        src: /etc/tabyaos-release
      register: tabyaos_release
    - ansible.builtin.assert:
        that: "'FIPSMode=enabled-pending-reboot' in (tabyaos_release.content | b64decode)"
        fail_msg: "FIPS: /etc/tabyaos-release missing FIPSMode=enabled-pending-reboot marker"

    # Kernel FIPS enablement requires reboot — only testable at QEMU/EKS layer.
    # Document what the full validation looks like so it's not forgotten.
    - name: Document kernel FIPS validation (informational — QEMU/EKS layer only)
      ansible.builtin.debug:
        msg: >
          INFO: Kernel-level FIPS validated at QEMU layer after reboot.
          Check: cat /proc/sys/crypto/fips_enabled == 1
          Check: fips-mode-setup --check output contains 'FIPS mode is enabled'
          Check: openssl speed -evp aes-256-cbc shows FIPS provider active
