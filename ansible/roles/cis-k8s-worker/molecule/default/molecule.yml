---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: tabyaos-cis-k8s-worker
    image: amazonlinux:2023
    # amazonlinux:2023 has no systemd; use bash entrypoint, privileged for
    # sysctl/modprobe writes, capabilities for auditctl operations.
    privileged: true
    pre_build_image: true
    networks:
      - name: molecule

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: default
  ansible_args:
    - --diff

verifier:
  name: ansible

lint: |
  set -e
  ansible-lint
