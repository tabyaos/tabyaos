---
- name: Verify — aide
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Assert aide package is installed
      ansible.builtin.package_facts:
        manager: rpm
    - ansible.builtin.assert:
        that: "'aide' in ansible_facts.packages"
        fail_msg: "CIS 1.3.1 | PCI Req 11.3.1: aide package not installed"

    - name: Assert /etc/aide.conf exists
      ansible.builtin.stat:
        path: /etc/aide.conf
      register: aide_conf
    - ansible.builtin.assert:
        that: aide_conf.stat.exists
        fail_msg: "CIS 1.3.1: /etc/aide.conf missing"

    - name: Assert /etc/aide.conf has restricted permissions
      ansible.builtin.assert:
        that: aide_conf.stat.mode == '0600'
        fail_msg: "CIS 1.3.1: /etc/aide.conf mode is {{ aide_conf.stat.mode }}, expected 0600"

    - name: Assert aide.conf monitors /etc
      ansible.builtin.slurp:
        src: /etc/aide.conf
      register: aide_conf_content
    - ansible.builtin.assert:
        that:
          - "'/etc' in (aide_conf_content.content | b64decode)"
          - "'/boot' in (aide_conf_content.content | b64decode)"
          - "'sha512' in (aide_conf_content.content | b64decode)"
        fail_msg: "CIS 1.3.1: aide.conf does not monitor critical paths or missing sha512"

    - name: Assert AIDE cron job is installed
      ansible.builtin.command:
        cmd: crontab -u root -l
      register: root_crontab
      changed_when: false
      failed_when: false
    - ansible.builtin.assert:
        that: "'aide' in root_crontab.stdout or root_crontab.rc != 0"
        fail_msg: "CIS 1.3.3: AIDE cron job not found in root crontab"
