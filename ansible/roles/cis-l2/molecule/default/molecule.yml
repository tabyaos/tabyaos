---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: tabyaos-cis-l2
    image: amazonlinux:2023
    # systemd requires privileged mode and cgroup mount.
    command: /sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    pre_build_image: true
    # Simulate common node packages being present.
    networks:
      - name: molecule

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: yaml
  ansible_args:
    - --diff

verifier:
  name: ansible

lint: |
  set -e
  ansible-lint
