---
# CIS AL2023 Section 6: System Maintenance

# ── 6.1 System File Permissions ───────────────────────────────────────────────

- name: CIS AL2023 6.1.1 | Ensure permissions on /etc/passwd
  ansible.builtin.file:
    path: /etc/passwd
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 6.1.2 | Ensure permissions on /etc/shadow
  ansible.builtin.file:
    path: /etc/shadow
    owner: root
    group: shadow
    mode: "0000"

- name: CIS AL2023 6.1.3 | Ensure permissions on /etc/group
  ansible.builtin.file:
    path: /etc/group
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 6.1.4 | Ensure permissions on /etc/gshadow
  ansible.builtin.file:
    path: /etc/gshadow
    owner: root
    group: shadow
    mode: "0000"

- name: CIS AL2023 6.1.5 | Ensure permissions on /etc/passwd-
  ansible.builtin.file:
    path: /etc/passwd-
    owner: root
    group: root
    mode: "0600"
  failed_when: false

- name: CIS AL2023 6.1.6 | Ensure permissions on /etc/shadow-
  ansible.builtin.file:
    path: /etc/shadow-
    owner: root
    group: shadow
    mode: "0000"
  failed_when: false

- name: CIS AL2023 6.1.7 | Ensure permissions on /etc/group-
  ansible.builtin.file:
    path: /etc/group-
    owner: root
    group: root
    mode: "0644"
  failed_when: false

- name: CIS AL2023 6.1.8 | Ensure no world-writable files exist
  ansible.builtin.command: >
    find / -xdev -type f -perm -0002
    -not -path '/proc/*' -not -path '/sys/*' -not -path '/dev/*'
  register: world_writable_files
  changed_when: false
  failed_when: world_writable_files.stdout_lines | length > 0 and not (cis_l2_world_writable_sticky_bit | bool)

- name: CIS AL2023 6.1.9 | Ensure no unowned files or directories exist
  ansible.builtin.command: >
    find / -xdev \( -nouser -o -nogroup \)
    -not -path '/proc/*' -not -path '/sys/*'
  register: unowned_files
  changed_when: false

- name: CIS AL2023 6.1.9 | Report unowned files
  ansible.builtin.debug:
    msg: "WARNING: Unowned files found: {{ unowned_files.stdout_lines }}"
  when: unowned_files.stdout_lines | length > 0

- name: CIS AL2023 6.1.10 | Ensure no SUID executables other than approved set
  ansible.builtin.command: >
    find / -xdev -type f -perm -4000
    -not -path '/proc/*' -not -path '/sys/*'
  register: suid_files
  changed_when: false

- name: CIS AL2023 6.1.11 | Ensure no SGID executables other than approved set
  ansible.builtin.command: >
    find / -xdev -type f -perm -2000
    -not -path '/proc/*' -not -path '/sys/*'
  register: sgid_files
  changed_when: false

- name: CIS AL2023 6.1.12 | Ensure sticky bit on world-writable directories
  ansible.builtin.shell: |
    set -o pipefail
    df --local -P | awk '{if (NR!=1) print $6}' | \
    xargs -I '{}' find '{}' -xdev -type d -perm -0002 ! -perm -1000 2>/dev/null | \
    xargs chmod a+t
  changed_when: false
  when: cis_l2_world_writable_sticky_bit | bool

# ── 6.2 User and Group Settings ───────────────────────────────────────────────

- name: CIS AL2023 6.2.1 | Ensure password fields are not empty
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '($2 == "") {print $1}' /etc/shadow
  register: empty_password_accounts
  changed_when: false
  failed_when: empty_password_accounts.stdout_lines | length > 0

- name: CIS AL2023 6.2.2 | Ensure no legacy '+' entries in /etc/passwd
  ansible.builtin.lineinfile:
    path: /etc/passwd
    regexp: '^\+'
    state: absent

- name: CIS AL2023 6.2.3 | Ensure no legacy '+' entries in /etc/shadow
  ansible.builtin.lineinfile:
    path: /etc/shadow
    regexp: '^\+'
    state: absent

- name: CIS AL2023 6.2.4 | Ensure no legacy '+' entries in /etc/group
  ansible.builtin.lineinfile:
    path: /etc/group
    regexp: '^\+'
    state: absent

- name: CIS AL2023 6.2.5 | Ensure root is the only UID 0 account
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '($3 == 0) {print $1}' /etc/passwd | grep -v '^root$'
  register: uid0_non_root
  changed_when: false
  failed_when: uid0_non_root.stdout_lines | length > 0

- name: CIS AL2023 6.2.7 | Ensure users' home directories exist and have correct permissions
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '($3 >= 1000 && $7 != "/sbin/nologin" && $7 != "/bin/false") {print $6}' /etc/passwd | \
    while read -r dir; do
      if [ -d "$dir" ]; then
        perms=$(stat -c "%a" "$dir")
        if [ "${perms: -2}" != "00" ]; then
          echo "$dir has group/world access: $perms"
        fi
      fi
    done
  register: home_dir_perms
  changed_when: false
