---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: tabyaos-ssm-only
    image: amazonlinux:2023
    command: /sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    pre_build_image: true
    networks:
      - name: molecule
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: yaml
  ansible_args: [--diff]
verifier:
  name: ansible
