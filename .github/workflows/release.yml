name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # e.g. v0.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'      # e.g. v0.1.0-alpha
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — validate workflow without building or releasing"
        required: false
        default: "true"
        type: boolean

permissions:
  id-token: write
  contents: write   # create GitHub Release
  packages: write

env:
  AWS_REGION: us-east-1
  PACKER_VERSION: "1.11.2"

jobs:
  release:
    name: Build, sign, and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"          # e.g. v0.1.0
          SHORT="${VERSION#v}"                  # e.g. 0.1.0
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short=${SHORT}"     >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.dry_run != true }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tabyaos-release-${{ steps.version.outputs.short }}

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Packer init
        run: packer init packer/al2023

      - name: Build x86_64 AMI (skipped in dry-run)
        id: build_x86
        if: ${{ inputs.dry_run != true }}
        run: |
          packer build \
            -only='amazon-ebs.al2023-x86_64' \
            -var ami_name_prefix="tabyaos-al2023-${{ steps.version.outputs.short }}" \
            -var-file=packer/al2023/vars/al2023.auto.pkrvars.hcl \
            -machine-readable \
            packer/al2023 | tee /tmp/packer-x86.txt

          AMI_X86=$(grep 'artifact,0,id' /tmp/packer-x86.txt | cut -d, -f6 | cut -d: -f2)
          echo "ami_id=${AMI_X86}" >> "$GITHUB_OUTPUT"

      - name: Dry-run placeholder (packer validate only)
        id: dry_run_x86
        if: ${{ inputs.dry_run == true }}
        run: |
          packer validate \
            -var aws_region=us-east-1 \
            -var subnet_id=subnet-placeholder \
            -evaluate-datasources=false \
            packer/al2023
          echo "DRY RUN: packer validate passed — skipping actual AMI build"
          echo "ami_id=ami-dryrun-x86" >> "$GITHUB_OUTPUT"

      - name: Build arm64 AMI (skipped in dry-run)
        id: build_arm64
        if: ${{ inputs.dry_run != true }}
        run: |
          packer build \
            -only='amazon-ebs.al2023-arm64' \
            -var ami_name_prefix="tabyaos-al2023-${{ steps.version.outputs.short }}" \
            -var-file=packer/al2023/vars/al2023.auto.pkrvars.hcl \
            -machine-readable \
            packer/al2023 | tee /tmp/packer-arm64.txt

          AMI_ARM=$(grep 'artifact,0,id' /tmp/packer-arm64.txt | cut -d, -f6 | cut -d: -f2)
          echo "ami_id=${AMI_ARM}" >> "$GITHUB_OUTPUT"

      - name: Dry-run placeholder arm64
        id: dry_run_arm64
        if: ${{ inputs.dry_run == true }}
        run: echo "ami_id=ami-dryrun-arm64" >> "$GITHUB_OUTPUT"

      - name: Resolve release AMI IDs
        id: release_amis
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "x86_64=${{ steps.dry_run_x86.outputs.ami_id }}" >> "$GITHUB_OUTPUT"
            echo "arm64=${{ steps.dry_run_arm64.outputs.ami_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "x86_64=${{ steps.build_x86.outputs.ami_id }}" >> "$GITHUB_OUTPUT"
            echo "arm64=${{ steps.build_arm64.outputs.ami_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate release metadata
        run: |
          cat > /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json <<EOF
          {
            "spdxVersion": "SPDX-2.3",
            "dataLicense": "CC0-1.0",
            "SPDXID": "SPDXRef-DOCUMENT",
            "name": "tabyaos-${{ steps.version.outputs.short }}",
            "documentNamespace": "https://github.com/${{ github.repository }}/releases/${{ steps.version.outputs.version }}/spdx",
            "creationInfo": {
              "created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "creators": ["Tool: GitHub Actions release workflow"]
            },
            "packages": [
              {
                "name": "tabyaos-al2023-x86_64",
                "SPDXID": "SPDXRef-Package-tabyaos-al2023-x86_64",
                "downloadLocation": "NOASSERTION",
                "filesAnalyzed": false,
                "versionInfo": "${{ steps.version.outputs.short }}",
                "externalRefs": [
                  {
                    "referenceCategory": "PACKAGE-MANAGER",
                    "referenceType": "purl",
                    "referenceLocator": "pkg:generic/tabyaos-al2023-x86_64@${{ steps.version.outputs.short }}?ami=${{ steps.release_amis.outputs.x86_64 }}"
                  }
                ]
              },
              {
                "name": "tabyaos-al2023-arm64",
                "SPDXID": "SPDXRef-Package-tabyaos-al2023-arm64",
                "downloadLocation": "NOASSERTION",
                "filesAnalyzed": false,
                "versionInfo": "${{ steps.version.outputs.short }}",
                "externalRefs": [
                  {
                    "referenceCategory": "PACKAGE-MANAGER",
                    "referenceType": "purl",
                    "referenceLocator": "pkg:generic/tabyaos-al2023-arm64@${{ steps.version.outputs.short }}?ami=${{ steps.release_amis.outputs.arm64 }}"
                  }
                ]
              }
            ]
          }
          EOF

          cat > /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.cdx.json <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "version": 1,
            "metadata": {
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "component": {
                "type": "operating-system",
                "name": "TabyaOS",
                "version": "${{ steps.version.outputs.short }}"
              }
            },
            "components": [
              {
                "type": "operating-system",
                "name": "tabyaos-al2023-x86_64",
                "version": "${{ steps.version.outputs.short }}",
                "properties": [
                  { "name": "aws.ami.id", "value": "${{ steps.release_amis.outputs.x86_64 }}" },
                  { "name": "aws.region", "value": "${{ env.AWS_REGION }}" },
                  { "name": "eks.version", "value": "1.31" }
                ]
              },
              {
                "type": "operating-system",
                "name": "tabyaos-al2023-arm64",
                "version": "${{ steps.version.outputs.short }}",
                "properties": [
                  { "name": "aws.ami.id", "value": "${{ steps.release_amis.outputs.arm64 }}" },
                  { "name": "aws.region", "value": "${{ env.AWS_REGION }}" },
                  { "name": "eks.version", "value": "1.31" }
                ]
              }
            ]
          }
          EOF

      - name: Sign SBOM with Cosign (keyless OIDC)
        run: |
          cosign sign-blob \
            --yes \
            --bundle /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json.bundle \
            /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json

      - name: Create provenance file
        run: |
          cat > /tmp/tabyaos-${{ steps.version.outputs.short }}-provenance.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "git_sha": "${{ github.sha }}",
            "build_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "ami_x86_64": "${{ steps.release_amis.outputs.x86_64 }}",
            "ami_arm64": "${{ steps.release_amis.outputs.arm64 }}",
            "aws_region": "${{ env.AWS_REGION }}",
            "eks_version": "1.31",
            "hardening_level": "cis_l2+pci_dss+soc2",
            "signed_by": "cosign-keyless-oidc",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TabyaOS ${{ steps.version.outputs.version }}
          body: |
            ## TabyaOS ${{ steps.version.outputs.version }}

            Hardened Amazon Linux 2023 AMI for EKS worker nodes.

            ### AMI IDs

            | Architecture | AMI ID | Region |
            |---|---|---|
            | x86_64 | `${{ steps.release_amis.outputs.x86_64 }}` | ${{ env.AWS_REGION }} |
            | arm64 | `${{ steps.release_amis.outputs.arm64 }}` | ${{ env.AWS_REGION }} |

            ### Compliance coverage

            - CIS Amazon Linux 2023 Benchmark Level 2
            - CIS Kubernetes Benchmark v1.8 (Worker Node)
            - PCI-DSS v4.0 (Requirements 1, 2, 5, 6, 7, 8, 10, 11)
            - SOC 2 Type II (CC6, CC7, CC8)

            ### Verification

            ```bash
            # Verify SBOM signature
            cosign verify-blob \
              --bundle tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json.bundle \
              tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json
            ```

            Built by GitHub Actions · Commit `${{ github.sha }}`
          files: |
            /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json
            /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.cdx.json
            /tmp/tabyaos-${{ steps.version.outputs.short }}-sbom.spdx.json.bundle
            /tmp/tabyaos-${{ steps.version.outputs.short }}-provenance.json
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
