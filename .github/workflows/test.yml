name: Test

# ─── Trigger strategy ─────────────────────────────────────────────────────────
# Layer 1 — Molecule (Docker, fast):  every PR + every push to main
# Layer 2 — kind (local K8s, medium): every PR + every push to main
# Layer 3 — EKS (AWS, full):          main branch merges + nightly cron only
on:
  pull_request:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'packer/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - 'packer/**'
      - 'tests/**'
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC — runs EKS layer too
  workflow_dispatch:
    inputs:
      run_eks:
        description: 'Run EKS smoke test'
        required: false
        default: 'false'
        type: boolean

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: tabyaos-ci-cluster
  PYTHON_VERSION: "3.12"

# ─── Layer 1: Molecule (Docker) ───────────────────────────────────────────────
jobs:
  molecule:
    name: Molecule — ${{ matrix.role }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role:
          - cis-l2
          - cis-k8s-worker
          - pci-dss-v4
          - soc2-cc6-cc7-cc8
          - auditd-pci
          - aide
          - chrony-hardened
          - fips-mode
          - ssm-only-access
          - cis-debian12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


      - name: Install molecule and dependencies
        run: |
          pip install \
            "molecule==6.*" \
            "molecule-plugins[docker]" \
            "ansible-core==2.17.*" \
            "ansible-lint==24.*" \
            "docker>=7"

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install \
            community.docker \
            ansible.posix \
            community.general

      - name: Pull test container image
        run: docker pull amazonlinux:2023

      - name: molecule converge + verify (idempotency included)
        working-directory: ansible/roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_VERBOSITY: 0
          # Pass Docker host socket so molecule can spin up containers.
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload molecule logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-logs-${{ matrix.role }}
          path: /tmp/molecule/
          retention-days: 7

  molecule-summary:
    name: Molecule — all roles
    runs-on: ubuntu-latest
    needs: molecule
    if: always()
    steps:
      - name: Check all molecule jobs
        run: |
          if [[ "${{ needs.molecule.result }}" != "success" ]]; then
            echo "One or more molecule scenarios failed"
            exit 1
          fi
          echo "All molecule scenarios passed"

# ─── Layer 2: kind ────────────────────────────────────────────────────────────
  kind-smoke:
    name: kind smoke test
    runs-on: ubuntu-latest
    needs: molecule-summary

    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.25.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create results directory
        run: mkdir -p /tmp/tabyaos-kind-results tests/kube-bench/baseline

      - name: Run kind smoke test
        run: |
          chmod +x tests/smoke/kind/run-kind-smoke.sh
          ./tests/smoke/kind/run-kind-smoke.sh --results-dir tests/kube-bench/baseline

      - name: Upload kube-bench kind results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kube-bench-kind-results
          path: tests/kube-bench/baseline/*-kind.json
          retention-days: 90

# ─── Layer 3: EKS (main + nightly only) ──────────────────────────────────────
  eks-smoke:
    name: EKS smoke test
    runs-on: ubuntu-latest
    # Only run on: (a) direct push to main, (b) nightly cron, (c) manual dispatch with run_eks=true
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_eks == 'true')
    needs: kind-smoke

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Run kube-bench via Kubernetes Job
        run: |
          kubectl apply -f tests/kube-bench/job.yaml
          kubectl -n kube-system wait \
            --for=condition=complete \
            job/kube-bench-node \
            --timeout=300s
          kubectl -n kube-system logs job/kube-bench-node \
            > tests/kube-bench/baseline/$(date -u +%Y%m%dT%H%M%SZ)-eks.json

      - name: Fail on critical kubelet check regressions
        run: |
          LATEST=$(ls -t tests/kube-bench/baseline/*-eks.json | head -1)
          CRITICAL=$(jq -r '
            .Controls[]?.tests[]?.results[]? |
            select(.status == "FAIL" and (.test_number | startswith("4.2")))
            | .test_number
          ' "${LATEST}" | wc -l | tr -d ' ')
          echo "Critical (4.2.x) FAIL count: ${CRITICAL}"
          [[ "${CRITICAL}" -gt 0 ]] && exit 1 || echo "OK"

      - name: Run EKS smoke test
        run: |
          chmod +x tests/smoke/smoke-test.sh
          TABYAOS_SMOKE_NS="tabyaos-eks-smoke-${{ github.run_id }}" \
            ./tests/smoke/smoke-test.sh

      - name: Upload EKS kube-bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kube-bench-eks-results
          path: tests/kube-bench/baseline/*-eks.json
          retention-days: 90

      - name: Clean up kube-bench job
        if: always()
        run: kubectl -n kube-system delete job kube-bench-node --ignore-not-found
