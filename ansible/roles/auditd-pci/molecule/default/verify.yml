---
- name: Verify — auditd-pci
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Assert PCI-DSS audit rules file exists
      ansible.builtin.stat:
        path: /etc/audit/rules.d/20-pci-dss.rules
      register: pci_rules
    - ansible.builtin.assert:
        that: pci_rules.stat.exists
        fail_msg: "PCI-DSS v4.0 Req 10.2: /etc/audit/rules.d/20-pci-dss.rules missing"

    - name: Assert PCI rules contain expected tags
      ansible.builtin.slurp:
        src: /etc/audit/rules.d/20-pci-dss.rules
      register: pci_rules_content
    - ansible.builtin.assert:
        that:
          - "'pci_chd_access' in (pci_rules_content.content | b64decode)"
          - "'pci_admin' in (pci_rules_content.content | b64decode)"
          - "'pci_modules' in (pci_rules_content.content | b64decode)"
        fail_msg: "PCI-DSS audit rules missing required key tags"

    - name: Assert auditd.conf write_logs is set
      ansible.builtin.shell:
        cmd: grep '^write_logs' /etc/audit/auditd.conf
      register: write_logs_check
      changed_when: false
    - ansible.builtin.assert:
        that: "'yes' in write_logs_check.stdout"
        fail_msg: "PCI-DSS v4.0 Req 10.5.1: write_logs not set to yes"

    - name: Assert /var/log/audit is mode 0700
      ansible.builtin.stat:
        path: /var/log/audit
      register: audit_dir_stat
    - ansible.builtin.assert:
        that: audit_dir_stat.stat.mode == '0700'
        fail_msg: "PCI-DSS v4.0 Req 10.3.2: /var/log/audit mode is {{ audit_dir_stat.stat.mode }}"
