---
# CIS Debian Linux 12 — Section 3: Network Configuration

# ── 3.1 Disable unused protocols ─────────────────────────────────────────────

- name: "CIS Debian12 3.1.1 | Disable DCCP"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/dccp.conf
    content: "install dccp /bin/true\nblacklist dccp\n"
    owner: root
    group: root
    mode: "0644"
  when: cis_debian12_disable_dccp | default(true)

- name: "CIS Debian12 3.1.2 | Disable SCTP"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/sctp.conf
    content: "install sctp /bin/true\nblacklist sctp\n"
    owner: root
    group: root
    mode: "0644"
  when: cis_debian12_disable_sctp | default(true)

- name: "CIS Debian12 3.1.3 | Disable RDS"
  ansible.builtin.copy:
    dest: /etc/modprobe.d/rds.conf
    content: "install rds /bin/true\nblacklist rds\n"
    owner: root
    group: root
    mode: "0644"
  when: cis_debian12_disable_rds | default(true)

# ── 3.2 Network Parameters (host only) ───────────────────────────────────────

- name: "CIS Debian12 3.2 | Deploy network sysctl config"
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-cis-debian12-network.conf
    content: |
      # CIS Debian12 3.2.1 — send redirects
      net.ipv4.conf.all.send_redirects = {{ cis_debian12_net_send_redirects }}
      net.ipv4.conf.default.send_redirects = {{ cis_debian12_net_send_redirects }}
      # CIS Debian12 3.2.2 — accept redirects
      net.ipv4.conf.all.accept_redirects = {{ cis_debian12_net_accept_redirects }}
      net.ipv4.conf.default.accept_redirects = {{ cis_debian12_net_accept_redirects }}
      net.ipv6.conf.all.accept_redirects = {{ cis_debian12_net_accept_redirects }}
      net.ipv6.conf.default.accept_redirects = {{ cis_debian12_net_accept_redirects }}
      # CIS Debian12 3.2.3 — source routing
      net.ipv4.conf.all.accept_source_route = {{ cis_debian12_net_accept_source_route }}
      net.ipv4.conf.default.accept_source_route = {{ cis_debian12_net_accept_source_route }}
      net.ipv6.conf.all.accept_source_route = {{ cis_debian12_net_accept_source_route }}
      net.ipv6.conf.default.accept_source_route = {{ cis_debian12_net_accept_source_route }}
      # CIS Debian12 3.2.4 — log martians
      net.ipv4.conf.all.log_martians = {{ cis_debian12_net_log_martians }}
      net.ipv4.conf.default.log_martians = {{ cis_debian12_net_log_martians }}
      # CIS Debian12 3.2.5 — rp_filter
      net.ipv4.conf.all.rp_filter = {{ cis_debian12_net_rp_filter }}
      net.ipv4.conf.default.rp_filter = {{ cis_debian12_net_rp_filter }}
      # CIS Debian12 3.2.6 — IPv6 router advertisements
      net.ipv6.conf.all.accept_ra = {{ cis_debian12_net_ipv6_accept_ra }}
      net.ipv6.conf.default.accept_ra = {{ cis_debian12_net_ipv6_accept_ra }}
    owner: root
    group: root
    mode: "0644"

# K8s worker nodes must have ip_forward=1 for pod networking
- name: "CIS Debian12 3.3.4 | ip_forward for K8s pod networking"
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-cis-debian12-k8s-network.conf
    content: |
      # K8s nodes require ip_forward — CIS exception for container workloads
      net.ipv4.ip_forward = {{ cis_debian12_net_ip_forward }}
    owner: root
    group: root
    mode: "0644"

- name: "CIS Debian12 3.2 | Apply network sysctl settings"
  ansible.posix.sysctl:
    sysctl_file: /etc/sysctl.d/99-cis-debian12-network.conf
    reload: true
  changed_when: false
  failed_when: false
