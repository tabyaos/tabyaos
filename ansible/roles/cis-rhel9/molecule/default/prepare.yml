---
- name: Prepare — install Python and base packages in UBI9 container
  hosts: all
  gather_facts: false

  tasks:
    - name: Install Python and base packages
      ansible.builtin.raw: >-
        dnf install -y python3 python3-dnf sudo curl procps
        audit libpwquality openssh-server authselect
        2>/dev/null || true
      changed_when: false
      retries: 3
      delay: 5

    - name: Create required directories
      ansible.builtin.raw: |
        mkdir -p /etc/modprobe.d /etc/audit/rules.d /etc/sysctl.d \
          /etc/security/limits.d /etc/profile.d /etc/cron.d /etc/cron.daily \
          /etc/default /etc/ssh /etc/systemd/system \
          /etc/kubernetes /var/lib/kubelet/pki \
          /var/log/audit
      changed_when: false
