---
# CIS Debian Linux 12 — Section 2: Services

- name: "CIS Debian12 2.1 | Remove avahi-daemon"
  ansible.builtin.apt:
    name: avahi-daemon
    state: absent
  when: (cis_debian12_remove_avahi | default(true)) and (cis_debian12_manage_services | default(true))

- name: "CIS Debian12 2.2 | Remove cups"
  ansible.builtin.apt:
    name: cups
    state: absent
  when: (cis_debian12_remove_cups | default(true)) and (cis_debian12_manage_services | default(true))

