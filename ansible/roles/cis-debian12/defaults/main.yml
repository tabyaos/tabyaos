---
# CIS Debian Linux 12 Benchmark Level 2 — configurable defaults.

cis_debian12_manage_services: true

# ── Section 1: Filesystem ────────────────────────────────────────────────────
cis_debian12_disable_cramfs: true       # CIS Debian12 1.1.1.1
cis_debian12_disable_squashfs: true     # CIS Debian12 1.1.1.2
cis_debian12_disable_udf: true          # CIS Debian12 1.1.1.3
cis_debian12_disable_usb_storage: true  # CIS Debian12 1.1.1.4
cis_debian12_tmp_mount_opts: "mode=1777,strictatime,noexec,nodev,nosuid"

# ── Section 2: Services ──────────────────────────────────────────────────────
cis_debian12_remove_avahi: true
cis_debian12_remove_cups: true
cis_debian12_remove_isc_dhcp_server: true
cis_debian12_remove_slapd: true
cis_debian12_remove_nfs_server: true
cis_debian12_remove_bind9: true
cis_debian12_remove_vsftpd: true
cis_debian12_remove_apache2: true
cis_debian12_remove_dovecot: true
cis_debian12_remove_samba: true
cis_debian12_remove_squid: true
cis_debian12_remove_snmpd: true
cis_debian12_remove_telnetd: true
cis_debian12_remove_rsh_client: true
cis_debian12_remove_nis: true

# ── Section 3: Network ───────────────────────────────────────────────────────
cis_debian12_net_ip_forward: 1              # K8s nodes need ip_forward=1
cis_debian12_net_send_redirects: 0
cis_debian12_net_accept_redirects: 0
cis_debian12_net_accept_source_route: 0
cis_debian12_net_log_martians: 1
cis_debian12_net_rp_filter: 1
cis_debian12_net_ipv6_accept_ra: 0
cis_debian12_disable_dccp: true
cis_debian12_disable_sctp: true
cis_debian12_disable_rds: true

# ── Section 4: Logging and Auditing ──────────────────────────────────────────
cis_debian12_auditd_max_log_file_action: keep_logs
cis_debian12_auditd_max_log_file: 8

# ── Section 5: Access, Authentication, Authorization ─────────────────────────
cis_debian12_ssh_ciphers: "aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr"
cis_debian12_ssh_macs: "hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256"
cis_debian12_ssh_kex: "curve25519-sha256,curve25519-sha256@libssh.org,ecdh-sha2-nistp521,ecdh-sha2-nistp384"
cis_debian12_ssh_max_auth_tries: 4
cis_debian12_ssh_login_grace_time: 60
cis_debian12_ssh_client_alive_interval: 300
cis_debian12_ssh_client_alive_count_max: 2

cis_debian12_account_lockout_attempts: 5  # CIS Debian12 5.3.2
cis_debian12_account_lockout_time: 900
cis_debian12_session_timeout: 900        # CIS Debian12 5.4.5
cis_debian12_password_minlen: 14
cis_debian12_password_minclass: 4
