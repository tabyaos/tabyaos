---
# CIS AL2023 Section 1: Initial Setup — Filesystem Configuration

# ── 1.1.1 Disable Unused Filesystems ────────────────────────────────────────

- name: CIS AL2023 1.1.1.1 | Disable cramfs filesystem
  ansible.builtin.copy:
    dest: /etc/modprobe.d/cramfs.conf
    content: |
      install cramfs /bin/true
    owner: root
    group: root
    mode: "0644"
  when: cis_l2_disable_cramfs | bool

- name: CIS AL2023 1.1.1.2 | Disable squashfs filesystem
  ansible.builtin.copy:
    dest: /etc/modprobe.d/squashfs.conf
    content: |
      install squashfs /bin/true
    owner: root
    group: root
    mode: "0644"
  when: cis_l2_disable_squashfs | bool

- name: CIS AL2023 1.1.1.3 | Disable udf filesystem
  ansible.builtin.copy:
    dest: /etc/modprobe.d/udf.conf
    content: |
      install udf /bin/true
    owner: root
    group: root
    mode: "0644"
  when: cis_l2_disable_udf | bool

- name: CIS AL2023 1.1.1.4 | Disable USB storage (L2)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/usb-storage.conf
    content: |
      install usb-storage /bin/true
    owner: root
    group: root
    mode: "0644"
  when: cis_l2_disable_usb_storage | bool

# ── 1.1.2–1.1.7 Separate Partitions ─────────────────────────────────────────
# These checks verify the mounts exist — if the AMI was built with separate
# partitions the tasks below set the correct mount options.

- name: CIS AL2023 1.1.2.x | Ensure /tmp is a separate partition
  ansible.builtin.assert:
    that: ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length > 0
    fail_msg: "/tmp is not a separate partition (CIS AL2023 1.1.2.1 — L2 required)"
    success_msg: "/tmp separate partition found"
  when: cis_l2_separate_tmp | bool
  ignore_errors: true

- name: CIS AL2023 1.1.2.2-4 | Set mount options on /tmp
  ansible.posix.mount:
    path: /tmp
    opts: "{{ cis_l2_tmp_mount_opts }}"
    state: present
  when: cis_l2_separate_tmp | bool

- name: CIS AL2023 1.1.2.x | Configure tmpfs for /tmp if no separate partition
  ansible.builtin.copy:
    dest: /etc/systemd/system/tmp.mount
    content: |
      [Unit]
      Description=Temporary Directory /tmp
      ConditionPathIsSymbolicLink=!/tmp
      DefaultDependencies=no
      Conflicts=umount.target
      Before=local-fs.target umount.target
      After=swap.target

      [Mount]
      What=tmpfs
      Where=/tmp
      Type=tmpfs
      Options={{ cis_l2_tmp_mount_opts }}

      [Install]
      WantedBy=local-fs.target
    owner: root
    group: root
    mode: "0644"
  when: not (cis_l2_separate_tmp | bool)
  notify: reload systemd

- name: CIS AL2023 1.1.2.x | Enable tmp.mount
  ansible.builtin.systemd:
    name: tmp.mount
    enabled: true
    state: started
  when: not (cis_l2_separate_tmp | bool) and (cis_l2_manage_services | bool)

# ── 1.3 Filesystem Integrity Checking ────────────────────────────────────────
# (Handled by the aide role — referenced here for completeness)

# ── 1.4 Secure Boot ──────────────────────────────────────────────────────────

- name: CIS AL2023 1.4.1 | Set permissions on bootloader config
  ansible.builtin.file:
    path: /boot/grub2/grub.cfg
    owner: root
    group: root
    mode: "0600"
  failed_when: false  # path may not exist on EFI systems

- name: CIS AL2023 1.4.1 | Set permissions on EFI bootloader config
  ansible.builtin.file:
    path: /boot/efi/EFI/amzn/grub.cfg
    owner: root
    group: root
    mode: "0600"
  failed_when: false

# ── 1.5 Additional Process Hardening ─────────────────────────────────────────

- name: CIS AL2023 1.5.1 | Restrict core dumps
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-cis-coredump.conf
    content: |
      * hard core 0
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 1.5.1 | Disable core dumps via sysctl
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: "0"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-cis-coredump.conf

- name: CIS AL2023 1.5.2 | Enable ASLR (Address Space Layout Randomisation)
  ansible.posix.sysctl:
    name: kernel.randomize_va_space
    value: "2"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-cis-aslr.conf

- name: CIS AL2023 1.5.3 | Disable prelink (breaks AIDE checksums and ASLR effectiveness)
  ansible.builtin.dnf:
    name: prelink
    state: absent

- name: CIS AL2023 1.5.4 | Ensure Automatic Error Reporting is not enabled
  ansible.builtin.dnf:
    name: abrt
    state: absent

# ── 1.6 Mandatory Access Control ─────────────────────────────────────────────

- name: CIS AL2023 1.6.1 | Ensure SELinux is installed
  ansible.builtin.dnf:
    name:
      - libselinux
      - policycoreutils
    state: present

- name: CIS AL2023 1.6.1.1 | Ensure SELinux is not disabled in bootloader
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: 'selinux=0'
    state: absent
  notify: rebuild initramfs

- name: CIS AL2023 1.6.1.2 | Set SELinux policy to targeted
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUXTYPE='
    line: 'SELINUXTYPE=targeted'

- name: CIS AL2023 1.6.1.3 | Set SELinux mode to enforcing
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: 'SELINUX=enforcing'

- name: CIS AL2023 1.6.1.3 | Set SELinux to enforcing in running system
  ansible.builtin.command: setenforce 1
  changed_when: false
  failed_when: false

# ── 1.7 Warning Banners ───────────────────────────────────────────────────────

- name: CIS AL2023 1.7.1 | Set /etc/motd
  ansible.builtin.copy:
    dest: /etc/motd
    content: |
      **************************************************************************
      AUTHORIZED USE ONLY. This system is the property of Tabya and is for
      authorized users only. By using this system you consent to monitoring.
      Unauthorized access is prohibited and subject to criminal and civil
      penalties.
      **************************************************************************
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 1.7.2 | Set /etc/issue
  ansible.builtin.copy:
    dest: /etc/issue
    content: |
      AUTHORIZED USE ONLY — Tabya TabyaOS Node
      Unauthorized access prohibited.
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 1.7.3 | Set /etc/issue.net
  ansible.builtin.copy:
    dest: /etc/issue.net
    content: |
      AUTHORIZED USE ONLY — Tabya TabyaOS Node
      Unauthorized access prohibited.
    owner: root
    group: root
    mode: "0644"

- name: CIS AL2023 1.7.4-6 | Remove OS information from banners
  ansible.builtin.replace:
    path: "{{ item }}"
    regexp: '\\[msSrv]'
    replace: ''
  loop:
    - /etc/issue
    - /etc/issue.net
    - /etc/motd
  failed_when: false
